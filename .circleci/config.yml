version: 2.1

orbs:
  oidc: myhelix/oidc@1

jobs:
  integration-test:
    docker:
      - image: cimg/node:20.11
    environment:
      AWS_DEFAULT_REGION: us-east-1
    steps:
      - checkout
      - oidc/auth

      # Fetch credentials from Secrets Manager and export as env vars
      - run:
          name: Load test credentials
          command: |
            SECRET=$(aws secretsmanager get-secret-value \
              --secret-id /openbrain/ci/credentials \
              --region us-east-1 \
              --query SecretString \
              --output text)
            echo "export OPENBRAIN_API_URL=$(echo $SECRET | jq -r .api_url)" >> $BASH_ENV
            echo "export OPENBRAIN_USERNAME=$(echo $SECRET | jq -r .username)" >> $BASH_ENV
            echo "export OPENBRAIN_PASSWORD=$(echo $SECRET | jq -r .password)" >> $BASH_ENV
            echo "export OPENBRAIN_CLIENT_ID=$(echo $SECRET | jq -r .client_id)" >> $BASH_ENV
            echo "export OPENBRAIN_USER_POOL_ID=$(echo $SECRET | jq -r .user_pool_id)" >> $BASH_ENV

      - run:
          name: Run integration tests
          command: ./tests/run.sh

      - store_test_results:
          path: tests/test-results

workflows:
  integration:
    jobs:
      - integration-test:
          context: platform-development
          filters:
            branches:
              only: main
