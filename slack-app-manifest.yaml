display_information:
  name: Open Brain
  description: Search and capture your brain directly from Slack
  background_color: "#1a1a2e"

features:
  bot_user:
    display_name: brain
    always_online: true
  slash_commands:
    - command: /brain
      url: https://mt5dgvg3pk.execute-api.us-east-1.amazonaws.com/webhooks/slack
      description: Search and capture your brain
      usage_hint: "search <query> | capture <thought>"
      should_escape: false
  app_home:
    home_tab_enabled: false
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false

oauth_config:
  redirect_urls:
    - https://brain.blanxlait.ai/slack/callback
  scopes:
    bot:
      - commands
      - chat:write
      - im:history
      - im:read
      - im:write

settings:
  event_subscriptions:
    request_url: https://mt5dgvg3pk.execute-api.us-east-1.amazonaws.com/webhooks/slack
    bot_events:
      - message.im
  interactivity:
    is_enabled: false
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
