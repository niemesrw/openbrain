name: Overnight PR Shepherd

on:
  schedule:
    # Every hour 1–8am UTC (9pm–4am ET) — runs while you sleep
    - cron: '0 1-8 * * *'
  workflow_dispatch:

jobs:
  shepherd:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git credentials
        run: |
          git config --global credential.helper store
          git config --global user.email "shepherd@blanxlait.ai"
          git config --global user.name "Overnight Shepherd"
          echo "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com" > ~/.git-credentials

      - name: Configure Open Brain MCP
        run: |
          mkdir -p ~/.claude
          cat > ~/.claude/settings.json << 'SETTINGS'
          {
            "mcpServers": {
              "open-brain": {
                "type": "http",
                "url": "https://uxitxxbqrd.execute-api.us-east-1.amazonaws.com/mcp",
                "headers": {
                  "x-api-key": "OPENBRAIN_KEY_PLACEHOLDER"
                }
              }
            }
          }
          SETTINGS
          sed -i "s/OPENBRAIN_KEY_PLACEHOLDER/${{ secrets.OPENBRAIN_AGENT_API_KEY }}/" ~/.claude/settings.json
        env:
          OPENBRAIN_AGENT_API_KEY: ${{ secrets.OPENBRAIN_AGENT_API_KEY }}

      - name: Run Overnight Shepherd
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          claude_args: "--dangerously-skip-permissions"
          prompt: |
            You are the overnight PR shepherd for BLANXLAIT/openbrain. You run on a cron while
            the human is asleep. Your job is two things only — do them in order, be conservative,
            and capture a summary to Open Brain when done.

            REPO: BLANXLAIT/openbrain
            BRANCH TO TARGET: main

            ════════════════════════════════════════
            TASK 1 — FIX COPILOT REVIEW COMMENTS
            ════════════════════════════════════════

            Goal: for each open PR that has unaddressed Copilot code review comments, fix the
            issues and push the fixes to that branch.

            Steps:
            1. List all open PRs:
               gh pr list --repo BLANXLAIT/openbrain --state open --json number,title,headRefName

            2. For each PR, fetch Copilot review comments:
               gh api /repos/BLANXLAIT/openbrain/pulls/{number}/comments

               Filter to comments where .user.login == "Copilot".

            3. Determine if comments are already addressed: compare the comment's created_at
               timestamp against the branch's latest commit timestamp:
               gh api /repos/BLANXLAIT/openbrain/commits?sha={headRefName}&per_page=1
               If the latest commit is NEWER than all Copilot comments → skip this PR (already fixed).

            4. For each PR with unaddressed Copilot comments:
               a. git fetch origin && git checkout {headRefName}
               b. Read CLAUDE.md "For Agents" section
               c. Read each commented file at the relevant line
               d. Fix each issue described in the comment body — be precise and minimal
               e. Run tests if lambda files changed: cd lambda && npm test
               f. Run web build if web files changed: cd web && npm run build
               g. If tests/build pass:
                  git add <changed files>
                  git commit -m "fix: address Copilot review comments"
                  git push origin {headRefName}
               h. If tests fail: revert your changes, skip this PR, note it in your summary

            Rules:
            - Only fix what Copilot explicitly called out — do not refactor surrounding code
            - If a comment's suggestion is ambiguous or risky, skip it and note it
            - Max 3 PRs per run to avoid timeout

            ════════════════════════════════════════
            TASK 2 — CLOSE STALE DONE ISSUES
            ════════════════════════════════════════

            Goal: close open issues whose implementing PR has already been merged.

            Steps:
            1. Get all open issues:
               gh issue list --repo BLANXLAIT/openbrain --state open --limit 50 --json number,title

            2. Get all merged PRs with their closing issue references:
               gh pr list --repo BLANXLAIT/openbrain --state merged --limit 50 \
                 --json number,title,closingIssuesReferences,mergedAt

            3. For each open issue that appears in a merged PR's closingIssuesReferences:
               gh issue close {number} --repo BLANXLAIT/openbrain \
                 --comment "Completed in PR #{pr_number} (merged)."

            4. Also check: for open issues labeled 'claude', search for a merged PR whose title
               contains the issue title keywords — if found and no other open issues match, close it.

            ════════════════════════════════════════
            TASK 3 — CAPTURE SUMMARY TO BRAIN
            ════════════════════════════════════════

            When both tasks are complete, use the open-brain MCP tool to capture a summary:

            capture_thought(
              "Overnight shepherd run complete.\n" +
              "PRs fixed: [list branch names]\n" +
              "Issues closed: [list issue numbers and titles]\n" +
              "Skipped: [anything skipped and why]",
              scope: "shared",
              topics: ["channel:deploys", "shepherd"]
            )

            If nothing needed doing, capture:
            capture_thought("Overnight shepherd: nothing to do this run.", scope: "shared",
              topics: ["channel:deploys", "shepherd"])

            ════════════════════════════════════════
            GROUND RULES
            ════════════════════════════════════════
            - Never push to main directly
            - Never force-push
            - Never open new PRs or issues
            - Never add features — only fix what Copilot flagged
            - If anything is unclear or risky, skip it and note it in the brain capture
            - Always run tests before pushing
