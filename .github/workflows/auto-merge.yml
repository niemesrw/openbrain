name: Auto-merge Claude PRs

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

jobs:
  auto-merge:
    # Only merge claude/ branches where CI passed
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'claude/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Merge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          PR_NUMBER=$(gh pr list --head "$BRANCH" --state open --json number -q '.[0].number')
          if [ -z "$PR_NUMBER" ]; then
            echo "No open PR found for branch $BRANCH — skipping"
            exit 0
          fi
          echo "Merging PR #$PR_NUMBER ($BRANCH)"
          gh pr merge "$PR_NUMBER" --squash --delete-branch
