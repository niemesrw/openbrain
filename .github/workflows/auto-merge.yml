name: Auto-merge Claude PRs

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

jobs:
  auto-merge:
    # Only merge PRs authored by Claude where CI passed
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Merge PR if authored by Claude
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          PR_JSON=$(gh pr list --head "$BRANCH" --state open --json number,author -q '.[0]')
          if [ -z "$PR_JSON" ]; then
            echo "No open PR found for branch $BRANCH — skipping"
            exit 0
          fi
          PR_NUMBER=$(echo "$PR_JSON" | jq -r '.number')
          PR_AUTHOR=$(echo "$PR_JSON" | jq -r '.author.login')
          if [[ "$PR_AUTHOR" != "claude" && "$PR_AUTHOR" != "claude[bot]" && "$PR_AUTHOR" != "app/claude" ]]; then
            echo "PR #$PR_NUMBER authored by $PR_AUTHOR (not Claude) — skipping auto-merge"
            exit 0
          fi
          echo "Merging PR #$PR_NUMBER ($BRANCH) by $PR_AUTHOR"
          gh pr merge "$PR_NUMBER" --squash --delete-branch
