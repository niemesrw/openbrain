name: Claude Code

on:
  issues:
    types: [labeled]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issues' && github.event.label.name == 'claude') ||
      (github.event_name == 'pull_request_review' && github.event.review.author_association == 'CONTRIBUTOR' && github.event.review.user.login == 'copilot-pull-request-reviewer')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Configure Open Brain MCP
        run: |
          mkdir -p ~/.claude
          cat > ~/.claude/settings.json << 'SETTINGS'
          {
            "mcpServers": {
              "open-brain": {
                "type": "http",
                "url": "https://uxitxxbqrd.execute-api.us-east-1.amazonaws.com/mcp",
                "headers": {
                  "x-api-key": "OPENBRAIN_KEY_PLACEHOLDER"
                }
              }
            }
          }
          SETTINGS
          sed -i "s/OPENBRAIN_KEY_PLACEHOLDER/${{ secrets.OPENBRAIN_AGENT_API_KEY }}/" ~/.claude/settings.json
        env:
          OPENBRAIN_AGENT_API_KEY: ${{ secrets.OPENBRAIN_AGENT_API_KEY }}

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          show_full_output: true
          prompt: |
            ${{ github.event_name == 'issues' && format('
              You have been assigned issue #{0}: {1}

              IMPORTANT: You MUST end this session with one of two outcomes:
              A) A pull request is open against main, OR
              B) A comment is posted on the issue explaining why you stopped.
              Finishing silently with neither is not acceptable.

              STEP 1 — Check the brain for context (open-brain MCP tools are available in your session):
              - search_thoughts for keywords from this issue to see what is already built or in-flight
              - If a conflicting task is in progress, post a comment on the issue and stop.

              STEP 2 — Assess scope:
              - If the issue touches >8 files or spans multiple sub-systems, post a comment listing
                the suggested sub-tasks, then stop.
              - If appropriately scoped, proceed.

              STEP 3 — Capture start to brain:
              - capture_thought("Starting issue #{0}: {1}", scope: "shared")

              STEP 4 — Implement:
              1. Read CLAUDE.md "For Agents" section and all relevant existing files
              2. Create a feature branch (feat/ or fix/ prefix)
              3. Implement, run cd lambda && npm test to confirm tests pass
              4. Open a pull request against main referencing the issue number

              STEP 5 — Capture completion to brain:
              - capture_thought("Completed issue #{0}: {1} — PR opened", scope: "shared")
            ', github.event.issue.number, github.event.issue.title) || '' }}
            ${{ github.event_name == 'pull_request_review' && format('
              Copilot has reviewed PR #{0} and left comments. Read all review comments carefully and address each one.
              Push your fixes to the existing PR branch. Do not open a new PR.
            ', github.event.pull_request.number) || '' }}
