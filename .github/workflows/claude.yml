name: Claude Code

on:
  issues:
    types: [labeled]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issues' && github.event.label.name == 'claude') ||
      (github.event_name == 'pull_request_review' && github.event.review.author_association == 'CONTRIBUTOR' && github.event.review.user.login == 'copilot-pull-request-reviewer')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          prompt: |
            ${{ github.event_name == 'issues' && format('
              You have been assigned issue #{0}: {1}

              FIRST — assess scope before writing any code:
              - Count how many files you will need to create or modify
              - If the issue touches >8 files or spans multiple sub-systems, post a comment on the issue
                listing the suggested sub-tasks, then stop. Do not attempt it.
              - If the issue is appropriately scoped, proceed.

              If proceeding:
              1. Read CLAUDE.md "For Agents" section and all relevant existing files
              2. Create a feature branch (feat/ or fix/ prefix)
              3. Implement the changes, run `cd lambda && npm test` to confirm tests pass
              4. Open a pull request against main referencing the issue number

              Do not ask for confirmation — either implement and open the PR, or comment and stop.
            ', github.event.issue.number, github.event.issue.title) || '' }}
            ${{ github.event_name == 'pull_request_review' && format('
              Copilot has reviewed PR #{0} and left comments. Read all review comments carefully and address each one.
              Push your fixes to the existing PR branch. Do not open a new PR.
            ', github.event.pull_request.number) || '' }}
