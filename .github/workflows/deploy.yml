name: Deploy to Production

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'skills/**'
      - 'migrations/**'
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  MANAGEMENT_ACCOUNT: ${{ vars.MANAGEMENT_ACCOUNT }}
  AI_ACCOUNT: ${{ vars.AI_ACCOUNT }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Lambda unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Install Lambda dependencies
        working-directory: lambda
        run: npm ci
      - name: Run Lambda tests
        working-directory: lambda
        run: npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Validate required variables
        run: |
          missing=()
          [ -z "$MANAGEMENT_ACCOUNT" ] && missing+=("MANAGEMENT_ACCOUNT")
          [ -z "$AI_ACCOUNT" ]         && missing+=("AI_ACCOUNT")
          if [ ${#missing[@]} -gt 0 ]; then
            for m in "${missing[@]}"; do echo "::error::Required repo variable not set: $m"; done
            exit 1
          fi

      # --- AWS Auth (two-hop: OIDC → management → AI account) ---

      - name: Configure AWS credentials (Management)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ env.MANAGEMENT_ACCOUNT }}:role/GitHubActionsRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Assume role in AI account
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ env.AI_ACCOUNT }}:role/GitHubDeployRole
          aws-region: ${{ env.AWS_REGION }}
          role-chaining: true

      # --- Build Lambda ---

      - name: Install Lambda dependencies
        working-directory: lambda
        run: npm ci

      # --- Build web (needed for CDK synth even when deploying infra only) ---

      - name: Install web dependencies
        working-directory: web
        run: rm -rf node_modules package-lock.json && npm install

      - name: Build web placeholder
        working-directory: web
        run: mkdir -p dist && echo '<!doctype html><html><body>placeholder</body></html>' > dist/index.html

      # --- Deploy infra stacks (everything except web) ---

      - name: Install CDK dependencies
        working-directory: cdk
        run: npm ci

      - name: Validate required secrets
        run: |
          missing=()
          warn=()
          # Required — deploy will produce broken Lambdas without these
          [ -z "$GOOGLE_CLIENT_ID" ]           && missing+=("GOOGLE_CLIENT_ID")
          [ -z "$GOOGLE_CLIENT_SECRET_ARN" ]   && missing+=("GOOGLE_CLIENT_SECRET_ARN")
          # GitHub App secrets (GH_APP_ID, GH_APP_PRIVATE_KEY, GH_APP_WEBHOOK_SECRET)
          # now live in AWS Secrets Manager — no longer needed as GitHub secrets.
          # Optional but recommended
          [ -z "$GH_APP_SLUG" ]                && warn+=("GH_APP_SLUG (web GitHub install link won't work)")
          [ -z "$CUSTOM_DOMAIN" ]              && warn+=("CUSTOM_DOMAIN (will use raw API Gateway URL)")

          for w in "${warn[@]}"; do echo "::warning::Optional secret not set: $w"; done
          if [ ${#missing[@]} -gt 0 ]; then
            for m in "${missing[@]}"; do echo "::error::Required secret not set: $m"; done
            exit 1
          fi
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET_ARN: ${{ secrets.GOOGLE_CLIENT_SECRET_ARN }}
          GH_APP_SLUG: ${{ secrets.GH_APP_SLUG }}
          CUSTOM_DOMAIN: ${{ secrets.CUSTOM_DOMAIN }}

      - name: CDK Deploy (infra stacks)
        working-directory: cdk
        run: |
          # Deploy sequentially (--concurrency 1) so Api completes before Data
          # starts. This ensures any removed Data exports are no longer imported
          # by Api before Data tries to delete them.
          npx cdk deploy \
            EnterpriseBrainVectors \
            EnterpriseBrainAuth \
            EnterpriseBrainApi \
            EnterpriseBrainData \
            --require-approval never \
            --concurrency 1
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET_ARN: ${{ secrets.GOOGLE_CLIENT_SECRET_ARN }}
          ALARM_EMAIL: ${{ secrets.ALARM_EMAIL }}
          CUSTOM_DOMAIN: ${{ secrets.CUSTOM_DOMAIN }}
          # GITHUB_APP_ID now lives in Secrets Manager (openbrain/github-app-id)
          APPLE_CLIENT_ID: ${{ secrets.APPLE_CLIENT_ID }}
          APPLE_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
          APPLE_PRIVATE_KEY_ARN: ${{ secrets.APPLE_PRIVATE_KEY_ARN }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          BUDGET_EMAIL: ${{ secrets.BUDGET_EMAIL }}

      - name: Check budget email
        id: budget
        run: |
          if [ -n "$BUDGET_EMAIL" ]; then echo "has_email=true" >> "$GITHUB_OUTPUT"; fi
        env:
          BUDGET_EMAIL: ${{ secrets.BUDGET_EMAIL }}

      - name: Deploy budget stack
        working-directory: cdk
        if: steps.budget.outputs.has_email == 'true'
        run: npx cdk deploy EnterpriseBrainBudget --require-approval never
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET_ARN: ${{ secrets.GOOGLE_CLIENT_SECRET_ARN }}
          BUDGET_EMAIL: ${{ secrets.BUDGET_EMAIL }}

      # --- Fetch CDK outputs for web build ---

      - name: Get stack outputs
        id: outputs
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name EnterpriseBrainApi \
            --query "Stacks[0].Outputs[?ExportName=='BrainApiUrl'].OutputValue" \
            --output text)
          USER_POOL_ID=$(aws cloudformation describe-stacks \
            --stack-name EnterpriseBrainAuth \
            --query "Stacks[0].Outputs[?ExportName=='BrainUserPoolId'].OutputValue" \
            --output text)
          WEB_CLIENT_ID=$(aws cloudformation describe-stacks \
            --stack-name EnterpriseBrainAuth \
            --query "Stacks[0].Outputs[?ExportName=='BrainWebClientId'].OutputValue" \
            --output text)
          COGNITO_DOMAIN=$(aws cloudformation describe-stacks \
            --stack-name EnterpriseBrainAuth \
            --query "Stacks[0].Outputs[?ExportName=='BrainCognitoDomain'].OutputValue" \
            --output text)
          CHAT_URL=$(aws cloudformation describe-stacks \
            --stack-name EnterpriseBrainApi \
            --query "Stacks[0].Outputs[?OutputKey=='ChatStreamUrl'].OutputValue" \
            --output text)
          # VITE_MCP_URL: use the branded custom domain when set (CloudFront proxies /mcp),
          # otherwise fall back to the raw API Gateway URL. Kept separate from VITE_API_URL
          # so other API routes (/slack/*, /google/*, /user, etc.) continue hitting API GW directly.
          if [ -n "${{ secrets.CUSTOM_DOMAIN }}" ]; then
            MCP_URL="https://${{ secrets.CUSTOM_DOMAIN }}/mcp"
          else
            MCP_URL="${API_URL}/mcp"
          fi
          {
            echo "api_url=$API_URL"
            echo "mcp_url=$MCP_URL"
            echo "user_pool_id=$USER_POOL_ID"
            echo "web_client_id=$WEB_CLIENT_ID"
            echo "cognito_domain=$COGNITO_DOMAIN"
            echo "chat_url=$CHAT_URL"
          } >> "$GITHUB_OUTPUT"

      # --- Build and deploy web (rebuild with real env vars) ---

      - name: Build web
        working-directory: web
        run: npm run build
        env:
          VITE_API_URL: ${{ steps.outputs.outputs.api_url }}
          VITE_MCP_URL: ${{ steps.outputs.outputs.mcp_url }}
          VITE_USER_POOL_ID: ${{ steps.outputs.outputs.user_pool_id }}
          VITE_WEB_CLIENT_ID: ${{ steps.outputs.outputs.web_client_id }}
          VITE_COGNITO_DOMAIN: ${{ steps.outputs.outputs.cognito_domain }}
          VITE_GITHUB_APP_SLUG: ${{ secrets.GH_APP_SLUG }}
          VITE_CHAT_URL: ${{ steps.outputs.outputs.chat_url }}

      - name: CDK Deploy (web stack)
        working-directory: cdk
        run: npx cdk deploy EnterpriseBrainWeb --require-approval never
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET_ARN: ${{ secrets.GOOGLE_CLIENT_SECRET_ARN }}
          CUSTOM_DOMAIN: ${{ secrets.CUSTOM_DOMAIN }}

      # --- Update Cognito callback URLs with CloudFront domain ---

      - name: Get CloudFront URL
        id: web
        run: |
          WEB_URL=$(aws cloudformation describe-stacks \
            --stack-name EnterpriseBrainWeb \
            --query "Stacks[0].Outputs[?ExportName=='BrainWebUrl'].OutputValue" \
            --output text)
          echo "url=$WEB_URL" >> "$GITHUB_OUTPUT"

      - name: Redeploy auth with production callback URLs
        working-directory: cdk
        run: |
          WEB_URL="${{ steps.web.outputs.url }}"
          npx cdk deploy EnterpriseBrainAuth --require-approval never \
            -c callbackUrls='["http://localhost:5173/callback","http://localhost:19836/callback","'"$WEB_URL"'/callback"]' \
            -c logoutUrls='["http://localhost:5173/login","http://localhost:19836/logout","'"$WEB_URL"'/login"]'
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET_ARN: ${{ secrets.GOOGLE_CLIENT_SECRET_ARN }}
          APPLE_CLIENT_ID: ${{ secrets.APPLE_CLIENT_ID }}
          APPLE_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
          APPLE_PRIVATE_KEY_ARN: ${{ secrets.APPLE_PRIVATE_KEY_ARN }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      # --- Print deployment info ---

      - name: Deployment summary
        run: |
          {
            echo "### Deployment Complete"
            echo ""
            echo "| Resource | Value |"
            echo "|----------|-------|"
            echo "| API URL | ${{ steps.outputs.outputs.api_url }} |"
            echo "| Web URL | ${{ steps.web.outputs.url }} |"
            echo "| Cognito Domain | ${{ steps.outputs.outputs.cognito_domain }} |"
          } >> "$GITHUB_STEP_SUMMARY"
