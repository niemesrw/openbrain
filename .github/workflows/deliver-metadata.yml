name: Deliver App Store Metadata

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'apple/OpenBrain/fastlane/metadata/**'
      - 'apple/OpenBrain/fastlane/screenshots/**'

jobs:
  deliver:
    runs-on: [self-hosted, macOS]
    defaults:
      run:
        working-directory: apple/OpenBrain

    steps:
      - uses: actions/checkout@v4

      - name: Set up Fastlane
        run: |
          echo "/opt/homebrew/bin" >> $GITHUB_PATH
          which fastlane || brew install fastlane

      - name: Upload metadata to App Store Connect
        run: fastlane metadata
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          FASTLANE_TEAM_ID: ${{ secrets.FASTLANE_TEAM_ID }}
