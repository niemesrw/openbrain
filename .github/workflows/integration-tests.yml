name: Integration Tests

on:
  workflow_dispatch: # Manual-only until /openbrain/ci/credentials secret is provisioned (see #4)

permissions:
  contents: read
  id-token: write

jobs:
  integration-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20

      # OIDC to management account
      - uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: arn:aws:iam::${{ vars.MANAGEMENT_ACCOUNT }}:role/GitHubActionsRole
          aws-region: us-east-1

      # Fetch credentials from Secrets Manager and export as env vars
      - name: Load test credentials
        run: |
          SECRET=$(aws secretsmanager get-secret-value \
            --secret-id /openbrain/ci/credentials \
            --region us-east-1 \
            --query SecretString \
            --output text)
          {
            echo "OPENBRAIN_API_URL=$(jq -r '.api_url' <<< "$SECRET")"
            echo "OPENBRAIN_USERNAME=$(jq -r '.username' <<< "$SECRET")"
            echo "OPENBRAIN_PASSWORD=$(jq -r '.password' <<< "$SECRET")"
            echo "OPENBRAIN_CLIENT_ID=$(jq -r '.client_id' <<< "$SECRET")"
            echo "OPENBRAIN_USER_POOL_ID=$(jq -r '.user_pool_id' <<< "$SECRET")"
          } >> "$GITHUB_ENV"

      - name: Run integration tests
        run: ./tests/run.sh
